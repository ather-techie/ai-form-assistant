<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Form Assistant — Options</title>
  <link rel="stylesheet" href="../sidebar/index.css" />
  <style>
    body { background: var(--bg); min-height: 100vh; }
    .options-shell { max-width: 600px; margin: 0 auto; padding: 32px 16px; }
    .options-header { display: flex; align-items: center; gap: 12px; margin-bottom: 28px; }
    .options-header h1 { font-size: 20px; font-weight: 700; }
    .options-tabs { display: flex; gap: 4px; margin-bottom: 24px; border-bottom: 1px solid var(--border); }
    .options-tab  { padding: 8px 16px; font-size: 13px; cursor: pointer; color: var(--text-muted); border-bottom: 2px solid transparent; }
    .options-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="./main.jsx"></script>
</body>
</html>
